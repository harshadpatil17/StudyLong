<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tasks | StudyLong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Daily Tasks</h1>
    <p>// plan your day, execute with precision</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="notes.html">Notes</a>
    <a href="timer.html">Focus Timer</a>
    <a href="tasks.html" class="active">Tasks</a>
    <a href="planner.html">Planner</a>
    <a href="streak.html">Streak</a>
</nav>

<main class="container">
    <section>
        <div class="tasks-header">
            <h2>📝 Today's Study Plan</h2>
            <div class="tasks-meta">
                <span id="taskDone">0</span> / <span id="taskTotal">0</span> tasks done
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a task (e.g. Solve 10 Integration problems)">
            <select id="taskPriority">
                <option value="high">🔴 High</option>
                <option value="med" selected>🟡 Medium</option>
                <option value="low">🔵 Low</option>
            </select>
            <button class="btn-add" onclick="addTask()">+ Add</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <p style="margin-top:16px; font-size:0.8rem; color:var(--text-muted);">
            ✅ Click the checkbox to mark complete. Tasks are saved locally and persist on refresh.
        </p>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
